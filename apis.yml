aid: university-of-amsterdam
name: University of Amsterdam
description: >-
  The University of Amsterdam (Universiteit van Amsterdam, UvA) is a public
  research university in Amsterdam, Netherlands, ranked #43 in the QS World
  University Rankings 2025. Its public developer/API footprint is centered on
  the University Library's open-data program: a Linked Open Data platform
  (Triply) exposing digitized collections via REST, SPARQL, and GraphQL, plus
  OAI-PMH metadata-harvesting endpoints for the central catalogue, archival
  collection descriptions, and the Figshare-backed research data repository.
  UvA does not publish a unified, key-issuing public developer portal; the
  confirmed machine-readable interfaces are library/open-data oriented and most
  institutional/SIS APIs are internal or gated.
type: Index
position: Consumer
access: 3rd-Party
