apis:
- aid: university-of-amsterdam:lod-triply-api
  name: UvA Library Linked Open Data API (Triply)
  description: >-
    REST API over the University of Amsterdam Library's Linked Open Data
    datasets (books, catalogue, images, letters, maps, audio, video, music,
    archaeological objects, and more), served on the Triply platform. Backed
    by SPARQL, GraphQL, Elasticsearch, and table-view query interfaces.
  humanURL: https://lod.uba.uva.nl/
  baseURL: https://api.lod.uba.uva.nl/datasets/UB-UVA/
  tags: [Open Data, Linked Data, Library, RDF, SPARQL, REST]
  properties:
