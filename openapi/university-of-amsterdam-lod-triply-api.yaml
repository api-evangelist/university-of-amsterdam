  /datasets/{account}/{dataset}/jobs:
    parameters:
      - $ref: "#/components/parameters/account"
      - $ref: "#/components/parameters/dataset"
    post:
      tags:
        - Jobs
      summary: Create an import job
      operationId: createJob
      description: >
        Creates a new data import job.


        **Simple upload** (files under 5 MB): send the file as

        `multipart/form-data`. The job is created and starts processing

        automatically.


        ```

        curl -H 'Authorization: Bearer TOKEN' \
          -X POST https://api.INSTANCE/datasets/ACCOUNT/DATASET/jobs \
          -F file=@./myfile.trig
        ```


        **Large-scale upload** (files over 5 MB): send a JSON body to

        create the job, then upload files using the

        [tus resumable upload
        protocol](https://tus.io/protocols/resumable-upload),

        and finally call `/jobs/{jobId}/start` to begin processing. See

        [TriplyDB Uploads](https://github.com/TriplyDB/TriplyDBUploads)

        for a reference implementation.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  $ref: "#/components/schemas/IndexJobType"
                baseIRI:
                  type: string
                  format: uri
                defaultGraphName:
                  type: string
                  format: uri
                overwriteAll:
                  type: boolean
                mergeGraphs:
                  type: boolean
                downloadUrls:
                  type: array
                  items:
                    type: string
                    format: uri
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IndexJob"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      tags:
        - Jobs
      summary: Cancel all error jobs
      operationId: cancelErrorJobs
      responses:
        "200":
          description: Cancelled job IDs
          content:
            application/json:
              schema:
                type: object
                properties:
                  deletedJobIds:
                    type: array
                    items:
                      type: string
