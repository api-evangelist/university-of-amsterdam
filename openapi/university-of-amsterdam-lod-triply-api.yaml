  /queries/{account}/{query}/run:
    parameters:
      - $ref: "#/components/parameters/account"
      - $ref: "#/components/parameters/queryName"
    head:
      tags:
        - Queries
      summary: Check if query can be executed
      operationId: headRunQuery
      security:
        - {}
      responses:
        "202":
          description: Query is executable
          headers:
            ETag:
              description: Fingerprint of query/data state
              schema:
                type: string
    get:
      tags:
        - Queries
      summary: Execute a saved query (latest version)
      operationId: runQuery
      description: >
        Executes the saved query and returns results. The response format
        depends

        on the SPARQL query type (SELECT, ASK, CONSTRUCT, DESCRIBE) and the

        requested content type.


        **Variable injection**: If the saved query defines variables, pass their

        values as query parameters. For example, a query with variable `city`

        is called as `?city=https://example.org/Amsterdam` (for NamedNode

        variables) or `?city=Amsterdam` (for Literal variables). Variable

        definitions are listed in the query's `variables` array.


        **Format extension**: Append a format extension to the path

        (e.g., `/run.csv`, `/run.jsonld`) to select the response format.

        The extension takes precedence over the `Accept` header.
      security:
        - {}
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: pageSize
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Query results
          headers:
            Link:
              $ref: "#/components/headers/Link"
          content:
            application/sparql-results+json:
              schema:
                type: object
            application/sparql-results+xml:
              schema:
                type: string
            text/turtle:
              schema:
                type: string
            application/trig:
              schema:
                type: string
            application/n-triples:
              schema:
                type: string
            application/n-quads:
              schema:
                type: string
            application/ld+json:
              schema:
                type: object
            text/csv:
              schema:
                type: string
            text/tab-separated-values:
              schema:
                type: string
    post:
      tags:
        - Queries
      summary: Execute a saved query (POST, for updates)
      operationId: runQueryPost
      security:
        - {}
      responses:
        "200":
          description: Query results
          content:
            application/sparql-results+json:
              schema:
                type: object
            application/sparql-results+xml:
              schema:
                type: string
            text/turtle:
              schema:
                type: string
            application/trig:
              schema:
                type: string
            application/n-triples:
              schema:
                type: string
            application/n-quads:
              schema:
                type: string
            application/ld+json:
              schema:
                type: object
            text/csv:
              schema:
                type: string
            text/tab-separated-values:
              schema:
                type: string
