  - date: '2026-06-03'
    rating: 3
    summary: >-
      Verified a real, public library/open-data API footprint. The UvA Library
      Linked Open Data platform (Triply) and its open-data publication-channels
      page resolve live (HTTP 200), as do the Figshare and archives OAI-PMH
      endpoints. The Alma central-catalogue OAI endpoint is documented as public
      but returned HTTP 403 to a scripted request (bot/User-Agent gating), so it
      is cataloged with that caveat. api.uva.nl is the Anton Pannekoek Institute
      for Astronomy website, not an API, and was excluded. No unified
      key-issuing developer portal or public SIS/course/timetable API was found;
      LinkedIn returns 999 (anti-bot) but is the verified official school page.
      No endpoints were fabricated.
